<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <g stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.95">
    <!-- sine wave -->
    <path d="M40 120 C 70 80, 100 160, 130 120 S 190 80, 220 120 S 280 160, 310 120" />
    <!-- small coordinate axes with curve -->
    <g transform="translate(360,60)">
      <path d="M0 90 L0 0 M0 90 L110 90" />
      <path d="M4 86 C 30 60, 55 20, 100 8" />
      <path d="M92 4 L100 8 L94 16" />
    </g>
    <!-- integral sign -->
    <path d="M130 220 C 118 220, 116 238, 128 244 C 140 250, 138 268, 126 268" transform="translate(0,0) scale(1.3)" />
    <!-- radical / square root -->
    <path d="M40 330 L54 350 L74 300 L120 300" />
    <!-- right-angle triangle with angle marks -->
    <g transform="translate(420,300)">
      <path d="M0 70 L0 0 L90 70 Z" />
      <path d="M10 70 A10 10 0 0 1 0 60" />
    </g>
    <!-- parabola sketch -->
    <path d="M300 420 C 330 360, 390 360, 420 420" />
    <!-- wavy underline accents -->
    <path d="M470 150 C 480 145, 490 155, 500 150" opacity="0.7" />
    <path d="M60 400 C 70 395, 80 405, 90 400" opacity="0.7" />
  </g>

  <g fill="#FFFFFF" font-family="'Segoe Script','Bradley Hand',cursive" opacity="0.95">
    <text x="330" y="200" font-size="34" transform="rotate(-6 330 200)">S = ∫f(x)dx</text>
    <text x="20" y="60" font-size="30" transform="rotate(-4 20 60)">y = Δx/Δ²</text>
    <text x="150" y="260" font-size="26" transform="rotate(5 150 260)">π ≈ 3.14</text>
    <text x="380" y="230" font-size="24" transform="rotate(-3 380 230)">a² + b² = c²</text>
    <text x="440" y="130" font-size="22" transform="rotate(6 440 130)">Σ(x-m)²</text>
    <text x="60" y="250" font-size="26" transform="rotate(-8 60 250)">n→∞</text>
    <text x="230" y="350" font-size="24" transform="rotate(4 230 350)">sin θ + cos θ</text>
    <text x="440" y="400" font-size="26" transform="rotate(-5 440 400)">A = πr²</text>
    <text x="20" y="470" font-size="24" transform="rotate(3 20 470)">x = -b ± √(b²-4ac) / 2a</text>
    <text x="330" y="470" font-size="24" transform="rotate(-4 330 470)">lim f(x)</text>
    <text x="150" y="90" font-size="24" transform="rotate(7 150 90)">f'(x) = 2x</text>
    <text x="490" y="60" font-size="22" transform="rotate(-6 490 60)">tan(2θ)</text>
  </g>
</svg>
