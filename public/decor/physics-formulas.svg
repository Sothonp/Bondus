<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 560" fill="none">
  <g transform="rotate(-8 350 280)">
    <g stroke="#1A1B3A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.85">
      <!-- squiggle -->
      <path d="M120 70 C 130 55, 145 55, 150 70 C 155 85, 168 85, 172 70" />
      <!-- impulse arrow -->
      <path d="M330 90 L400 90 M390 82 L400 90 L390 98" />
      <!-- hazard-stripe triangles -->
      <g transform="translate(350,145)">
        <path d="M0 26 L13 0 L26 26 Z" />
        <path d="M4 22 L13 6 L22 22" stroke-width="1.4" />
      </g>
      <g transform="translate(70,330)">
        <path d="M0 26 L13 0 L26 26 Z" />
        <path d="M4 22 L13 6 L22 22" stroke-width="1.4" />
      </g>
      <g transform="translate(500,420)">
        <path d="M0 30 L15 0 L30 30 Z" />
        <path d="M5 25 L15 7 L25 25" stroke-width="1.4" />
      </g>
      <!-- plus / minus -->
      <g transform="translate(60,150)">
        <circle cx="8" cy="8" r="9" />
        <path d="M4 8 L12 8 M8 4 L8 12" />
        <circle cx="34" cy="8" r="9" />
        <path d="M30 8 L38 8" />
      </g>
      <!-- apple -->
      <g transform="translate(410,150)">
        <path d="M6 20 C -4 8, 4 -4, 14 2 C 24 -4, 32 8, 22 20 C 18 28, 10 28, 6 20 Z" />
        <path d="M14 2 C 14 -4, 18 -8, 22 -9" />
        <path d="M16 -8 C 20 -12, 24 -10, 22 -6" />
      </g>
      <!-- lightbulb -->
      <g transform="translate(560,300)">
        <circle cx="14" cy="14" r="13" />
        <path d="M8 27 L20 27 M9 31 L19 31" />
        <path d="M14 1 L14 6 M1 14 L6 14 M27 14 L22 14 M4 4 L8 8 M24 4 L20 8" stroke-width="1.4" />
      </g>
      <!-- orbit / motion ring -->
      <g transform="translate(620,370)">
        <ellipse cx="20" cy="14" rx="20" ry="9" />
        <circle cx="38" cy="14" r="3" fill="#1A1B3A" stroke="none" />
      </g>
      <!-- lightning bolt -->
      <g transform="translate(30,460)">
        <path d="M20 0 L4 26 L16 26 L0 54 L28 20 L16 20 Z" />
      </g>
      <!-- radiation blob -->
      <g transform="translate(430,470)">
        <circle cx="15" cy="15" r="14" />
        <path d="M15 3 L15 15 L25 20" stroke-width="1.4" />
      </g>
      <!-- underline accents -->
      <path d="M170 118 C 200 112, 230 122, 260 116" opacity="0.6" />
      <path d="M330 250 C 350 244, 370 254, 390 248" opacity="0.6" />
      <path d="M60 400 C 80 394, 100 404, 120 398" opacity="0.6" />
    </g>

    <g fill="#1A1B3A" font-family="'Segoe Script','Bradley Hand',cursive" opacity="0.92">
      <text x="150" y="80" font-size="24">Impulse</text>
      <text x="20" y="115" font-size="26">J = Δp = ∫E dt</text>
      <text x="20" y="150" font-size="20">J = FΔt if F is</text>
      <text x="150" y="150" font-size="20">constant</text>
      <text x="380" y="115" font-size="26">Velocity</text>
      <text x="380" y="150" font-size="20">v'average = Δd/Δt</text>
      <text x="560" y="150" font-size="22">v = ds/dt</text>
      <text x="20" y="215" font-size="26">Gravity</text>
      <text x="15" y="245" font-size="22">F = Gm₁m₂/r²</text>
      <text x="200" y="220" font-size="20">½t + ½ at</text>
      <text x="240" y="260" font-size="24">Variance</text>
      <text x="200" y="295" font-size="20">S² = 1/N Σ(xᵢ-x̄)²</text>
      <text x="450" y="230" font-size="20">ρ = m/v</text>
      <text x="590" y="260" font-size="24">Density</text>
      <text x="300" y="335" font-size="30" font-weight="bold">E=mc²</text>
      <text x="270" y="365" font-size="20">Mass Energy</text>
      <text x="480" y="340" font-size="24">Motion</text>
      <text x="470" y="375" font-size="18">v'=v₀+at</text>
      <text x="470" y="405" font-size="18">S=½(v₀+v')t</text>
      <text x="10" y="380" font-size="22">Q = It</text>
      <text x="10" y="410" font-size="24">Charge</text>
      <text x="60" y="440" font-size="24">Kinetic Energy</text>
      <text x="60" y="470" font-size="20">T = ½mv²</text>
      <text x="240" y="440" font-size="20">Force</text>
      <text x="200" y="470" font-size="18">F Δt if F is</text>
      <text x="330" y="470" font-size="18">ΣF = dp/dt</text>
      <text x="200" y="500" font-size="18">v²=v₀²+2ac</text>
      <text x="360" y="500" font-size="18">ΣF = ma (Constant Mass)</text>
    </g>
  </g>
</svg>
